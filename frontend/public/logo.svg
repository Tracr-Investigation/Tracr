<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#1a1a1a" rx="10"/>
  
  <!-- Network Icon -->
  <g transform="translate(15, 15)">
    <!-- Lines -->
    <line x1="15" y1="15" x2="35" y2="35" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="35" y1="35" x2="55" y2="20" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="35" y1="35" x2="50" y2="55" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
    <line x1="15" y1="15" x2="55" y2="20" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
    <line x1="50" y1="55" x2="55" y2="20" stroke="#a78bfa" stroke-width="1.5" opacity="0.3"/>
    
    <!-- Dots -->
    <circle cx="15" cy="15" r="5" fill="#8b5cf6"/>
    <circle cx="35" cy="35" r="6" fill="#a78bfa"/>
    <circle cx="55" cy="20" r="5" fill="#8b5cf6"/>
    <circle cx="50" cy="55" r="4" fill="#ffffff"/>
    
    <!-- Center glow -->
    <circle cx="35" cy="35" r="10" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.2"/>
  </g>
</svg>