rules:
  - id: tracr-no-print-in-backend
    languages: [python]
    message: >
      print() oublié côté backend — utiliser le logger
      (logging.getLogger(__name__).info/.debug/.error).
      Les print() ne respectent pas le format de log et ne sont pas
      filtrables par niveau
    severity: WARNING
    paths:
      include: ["**/backend/"]
      exclude:
        - "**/backend/alembic/"
    pattern: print(...)
