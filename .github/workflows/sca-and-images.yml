name: SCA + Images + IaC (Trivy)

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 5 * * 1"   # lundi 05h UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-fs:
    name: Trivy filesystem (deps + IaC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - dépendances (SCA)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          format: sarif
          output: trivy-deps.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload SCA SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

      - name: Trivy - IaC / config (Dockerfile, compose)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload IaC SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # Images Docker construites
  trivy-images:
    name: Trivy image - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend, websocket]
    steps:
      - uses: actions/checkout@v4

      - name: Build image (${{ matrix.service }})
        run: docker build -t tracr-${{ matrix.service }}:ci ./${{ matrix.service }}

      - name: Trivy - scan image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: tracr-${{ matrix.service }}:ci
          format: sarif
          output: trivy-image-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln,secret

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}
